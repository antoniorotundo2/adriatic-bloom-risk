services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: sit_microalghe
      POSTGRES_USER: sit_user
      POSTGRES_PASSWORD: sit_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sit_user -d sit_microalghe"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./webmap:/app/webmap:ro

volumes:
  pgdata:
